meters:
  - name: contract_engagement
    description: Any platform or data integration is scoped under the enterprise customer contract.
    unit: varies
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Treat any Quaker Houghton integration as opaque from a FinOps perspective; surface
      contracted spend through procurement reporting rather than vendor telemetry.
  - name: Allocation
    description: Allocate the contract spend against the consuming manufacturing or operations cost
      center named in the agreement.
  - name: Optimization
    description: Optimization happens at contract renewal; review consumption reports furnished by the
      Quaker Houghton account team and renegotiate as needed.
  - name: Accountability
    description: Procurement and the operations sponsor co-own the contract; engineering teams should
      route integration changes through the account team.
